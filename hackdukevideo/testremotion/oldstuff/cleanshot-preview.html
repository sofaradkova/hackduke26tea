<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CleanShot Preview</title>
  <style>
    :root {
      --bg-a: #0f172a;
      --bg-b: #111827;
      --panel: #0b1220;
      --panel-top-a: #1f2937;
      --panel-top-b: #111827;
      --border: rgba(255, 255, 255, 0.18);
      --text: #d1d5db;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--bg-a) 0%, var(--bg-b) 100%);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 32px;
    }

    .window {
      width: min(1600px, 100%);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      background: var(--panel);
    }

    .window-top {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      background: linear-gradient(180deg, var(--panel-top-a), var(--panel-top-b));
      color: var(--text);
      font-size: 18px;
      font-weight: 600;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .dot-red { background: #ef4444; }
    .dot-yellow { background: #f59e0b; }
    .dot-green { background: #22c55e; }

    .title {
      margin-left: 12px;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <main class="window">
    <header class="window-top">
      <span class="dot dot-red" aria-hidden="true"></span>
      <span class="dot dot-yellow" aria-hidden="true"></span>
      <span class="dot dot-green" aria-hidden="true"></span>
      <span class="title">CleanShot Preview</span>
    </header>

    <section class="video-wrap">
      <video
        src="public/CleanShot 2026-02-16 at 22.39.04.mp4"
        controls
        autoplay
        muted
        loop
        playsinline
      ></video>
    </section>
  </main>
</body>
</html>
